{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openprime-app-backend.fullname" . }}-migrate
  labels:
    {{- include "openprime-app-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    # Run as a pre-sync hook so migrations are applied before the app rolls out.
    # ArgoCD maps Helm pre-install/pre-upgrade hooks to PreSync; if this Job fails
    # the sync stops and the old Deployment keeps running (safe).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        # Deliberately NOT the app selectorLabels: the "-migrate" name keeps this
        # pod out of the backend Service endpoints (no traffic routed to it) and
        # out of the app NetworkPolicy selector (so it retains egress to Postgres).
        app.kubernetes.io/name: {{ include "openprime-app-backend.name" . }}-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: db-migrate
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openprime-app-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          env:
            {{- include "openprime-app-backend.env" . | trimPrefix "\n" | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
