name: Publish (Dev)

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml

  publish-docker:
    needs: test
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      tags: |
        type=ref,event=branch
        type=sha,prefix=dev-

  publish-helm:
    needs: [test, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.12.0"

      - name: Log in to Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package and Push Helm Chart (Dev)
        env:
          VERSION: 0.0.0-${{ github.sha }}
          IMAGE_TAG: ${{ needs.publish-docker.outputs.image-version }}
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        run: |
          # Use a development version for the chart
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: "${IMAGE_TAG}"/" chart/Chart.yaml

          # Update values.yaml
          sed -i "s|repository:.*|repository: ${REGISTRY}/${IMAGE_NAME}|" chart/values.yaml
          sed -i "s/tag:.*/tag: "${IMAGE_TAG}"/" chart/values.yaml

          mkdir -p charts/
          helm package ./chart --version ${VERSION} --destination ./charts/
          helm push ./charts/openprime-app-backend-${VERSION}.tgz oci://${REGISTRY}/${{ github.repository_owner }}/helm
