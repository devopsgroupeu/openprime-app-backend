name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.version.outputs.version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force fetch tags
        run: git fetch --tags --force

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release > semantic-release.log 2>&1
          cat semantic-release.log
          if grep -q "Published release" semantic-release.log; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version
        id: version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  publish-docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      tags: |
        type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
        type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
        type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
        type=raw,value=latest

  publish-helm:
    needs: [release, publish-docker]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.12.0"

      - name: Log in to Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package and Push Helm Chart
        env:
          VERSION: ${{ needs.release.outputs.version }}
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        run: |
          # Update version in Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml

          # Update values.yaml
          sed -i "s|repository:.*|repository: ${REGISTRY}/${IMAGE_NAME}|" chart/values.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" chart/values.yaml

          mkdir -p charts/
          helm package ./chart --destination ./charts/
          helm push ./charts/openprime-app-backend-${VERSION}.tgz oci://${REGISTRY}/${{ github.repository_owner }}/helm
